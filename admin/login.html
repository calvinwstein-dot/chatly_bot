<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Chappy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #09090b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #18181b;
            border: 1px solid rgba(56, 139, 253, 0.15);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(56, 139, 253, 0.08), 0 20px 60px rgba(0,0,0,0.5);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #f4f4f5;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #a1a1aa;
            font-size: 14px;
        }

        .lock-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: rgba(56, 139, 253, 0.1);
            border: 1px solid rgba(56, 139, 253, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-icon svg {
            width: 28px;
            height: 28px;
            stroke: #388bfd;
            fill: none;
            stroke-width: 2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a1a1aa;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            font-size: 15px;
            color: #f4f4f5;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input::placeholder {
            color: #52525b;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(56, 139, 253, 0.5);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: rgba(56, 139, 253, 0.15);
            color: #388bfd;
            border: 1px solid rgba(56, 139, 253, 0.3);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: rgba(56, 139, 253, 0.25);
            box-shadow: 0 0 20px rgba(56, 139, 253, 0.15);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="lock-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h1>Admin Login</h1>
            <p>Sign in to access the Chappy admin panel</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="admin@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Sign In
            </button>
        </form>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3001'
            : 'https://chatly-bot-1.onrender.com';

        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        // If already authenticated, redirect to admin
        const existingToken = localStorage.getItem('supabase_access_token');
        if (existingToken) {
            // Quick verify before redirect
            fetch(`${API_BASE}/api/admin/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: existingToken })
            }).then(r => r.json()).then(d => {
                if (d.valid) {
                    // Set cookie and redirect
                    document.cookie = `supabase-auth-token=${existingToken};path=/;max-age=86400;SameSite=Lax`;
                    window.location.href = '/admin/index.html';
                } else {
                    // Clear stale tokens
                    localStorage.removeItem('supabase_access_token');
                    localStorage.removeItem('supabase_refresh_token');
                    document.cookie = 'supabase-auth-token=;path=/;max-age=0';
                }
            }).catch(() => {});
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMessage.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store tokens
                    localStorage.setItem('supabase_access_token', data.accessToken);
                    localStorage.setItem('supabase_refresh_token', data.refreshToken);
                    
                    // Set cookie for static file middleware auth
                    document.cookie = `supabase-auth-token=${data.accessToken};path=/;max-age=86400;SameSite=Lax`;
                    
                    // Redirect to admin panel
                    window.location.href = '/admin/index.html';
                } else {
                    errorMessage.textContent = data.error || 'Invalid credentials';
                    errorMessage.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
